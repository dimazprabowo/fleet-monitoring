  CARA PAKAI DI BLOGGER:
    1. Deploy backend.js sebagai Web App (Anyone) → salin URL /exec

<script>
// ============================================================
// STATE
// ============================================================
const state = {
  view: "public-home",
  date: isoToday(),
  vehicles: [],
  bookings: [],
  schedule: [],
  user: null,
  token: localStorage.getItem("fms_token") || null,
  selectedVehicleId: null,
  history: [],
  historyFilter: { from: "", to: "", status: "", kategori: "" },
  stats: null,
};

function isoToday() { return new Date().toISOString().slice(0, 10); }

// Date range helpers untuk booking multi-hari
function addDaysIso(iso, n) {
  const p = String(iso).split("-").map(x => parseInt(x, 10));
  const d = new Date(p[0], p[1] - 1, p[2]);
  d.setDate(d.getDate() + n);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}
function bookingDurasi(b) { return Math.max(1, parseInt(b.durasi) || 1); }
function bookingEnd(b) { return addDaysIso(b.tanggal, bookingDurasi(b) - 1); }
function bookingDates(b) {
  const n = bookingDurasi(b);
  const out = [];
  for (let i = 0; i < n; i++) out.push(addDaysIso(b.tanggal, i));
  return out;
}
function rangesOverlap(aStart, aEnd, bStart, bEnd) {
  return aStart <= bEnd && aEnd >= bStart;
}

// ============================================================
// API CLIENT — JSONP supaya aman dari Blogger (cross-origin)
// ============================================================
let _jsonpCounter = 0;
function api(action, params = {}) {
  return new Promise((resolve) => {
    if (IS_PREVIEW) return resolve(mockApi(action, params));

    const cbName = "fmsCb_" + (++_jsonpCounter) + "_" + Date.now();
    const url = new URL(GAS_URL);
    url.searchParams.set("action", action);
    url.searchParams.set("callback", cbName);
    Object.keys(params).forEach(k => {
      if (params[k] !== undefined && params[k] !== null) url.searchParams.set(k, params[k]);
    });

    const script = document.createElement("script");
    let done = false;
    const cleanup = () => {
      try { delete window[cbName]; } catch(e) { window[cbName] = undefined; }
      if (script.parentNode) script.parentNode.removeChild(script);
    };
    const timer = setTimeout(() => {
      if (done) return;
      done = true; cleanup();
      resolve({ success: false, msg: "Timeout — periksa GAS_URL & deploy." });
    }, 25000);

    window[cbName] = (data) => {
      if (done) return;
      done = true; clearTimeout(timer); cleanup();
      resolve(data);
    };
    script.onerror = () => {
      if (done) return;
      done = true; clearTimeout(timer); cleanup();
      resolve({ success: false, msg: "Gagal terhubung ke server." });
    };
    script.src = url.toString();
    document.head.appendChild(script);
  });
}

// Mock backend untuk preview offline
function mockApi(action, p) {
  const today = isoToday();
  if (!window._mockDb) {
    window._mockDb = {
      vehicles: [...DUMMY_VEHICLES],
      bookings: [...DUMMY_BOOKINGS],
    };
  }
  const db = window._mockDb;
  const vMap = Object.fromEntries(db.vehicles.map(v => [v.id, v]));

  switch (action) {
    case "ping": return { success: true };
    case "getPublicData": {
      const date = p.date || today;
      const schedule = db.bookings.filter(b => b.status !== "Rejected");
      return { success: true, vehicles: db.vehicles, bookings: db.bookings.filter(b => b.tanggal === date), schedule, date };
    }
    case "submitBooking": {
      const veh = vMap[p.vehicle_id];
      if (!veh) return { success: false, msg: "Armada tidak ditemukan." };
      if (veh.status && veh.status !== "Tersedia") return { success: false, msg: `Armada sedang ${veh.status} dan tidak dapat dibooking.` };
      const durasi = Math.max(1, parseInt(p.durasi) || 1);
      const newEnd = addDaysIso(p.tanggal, durasi - 1);
      const conflict = db.bookings.find(b => {
        if (b.vehicle_id !== p.vehicle_id) return false;
        if (b.status === "Rejected" || b.status === "Completed") return false;
        return rangesOverlap(p.tanggal, newEnd, b.tanggal, bookingEnd(b));
      });
      if (conflict) return { success: false, msg: `Tanggal bentrok dengan booking ${conflict.tanggal} → ${bookingEnd(conflict)} (${conflict.status}).` };
      const id = "BK-" + Date.now();
      db.bookings.push({ id, tanggal: p.tanggal, durasi, vehicle_id: p.vehicle_id, pic: p.pic, divisi: p.divisi, tujuan: p.tujuan, status: "Pending", driver: "", keterangan: "" });
      return { success: true, msg: "Booking diajukan.", id };
    }
    case "checkStatus": {
      const q = (p.q || "").toLowerCase();
      const data = db.bookings.filter(b => (b.pic || "").toLowerCase().includes(q))
        .map(b => ({ ...b, vehicle_nama: (vMap[b.vehicle_id]||{}).nama || "-", vehicle_plat: (vMap[b.vehicle_id]||{}).plat || "-", kategori: (vMap[b.vehicle_id]||{}).kategori || "-" }));
      return { success: true, data };
    }
    case "login":
      if (p.username === "admin" && p.password === "admin123") {
        return { success: true, user: { id:"U001", username:"admin", name:"Administrator", role:"Admin" }, token: "preview-token" };
      }
      return { success: false, msg: "Username / password salah." };
    case "validateSession":
      return p.token === "preview-token"
        ? { success: true, user: { id:"U001", name:"Administrator", role:"Admin" } }
        : { success: false };
    case "logout": return { success: true };
    case "getMonitoring": {
      const date = p.date || today;
      const schedule = db.bookings.filter(b => b.status !== "Rejected");
      return { success: true, vehicles: db.vehicles, bookings: db.bookings.filter(b => b.tanggal === date), schedule, date };
    }
    case "getBookingHistory": {
      let rows = db.bookings.map(b => ({ ...b, vehicle_nama: (vMap[b.vehicle_id]||{}).nama || "-", vehicle_plat: (vMap[b.vehicle_id]||{}).plat || "-", kategori: (vMap[b.vehicle_id]||{}).kategori || "-" }));
      if (p.from)     rows = rows.filter(r => r.tanggal >= p.from);
      if (p.to)       rows = rows.filter(r => r.tanggal <= p.to);
      if (p.status)   rows = rows.filter(r => r.status === p.status);
      if (p.kategori) rows = rows.filter(r => r.kategori === p.kategori);
      rows.sort((a,b) => b.tanggal.localeCompare(a.tanggal));
      return { success: true, data: rows };
    }
    case "getDashboardStats": {
      const todays = db.bookings.filter(b => b.tanggal === today);
      return { success: true, stats: {
        total_vehicles: db.vehicles.length,
        by_category: Object.fromEntries(CATEGORIES.map(c => [c.key, db.vehicles.filter(v => v.kategori === c.key).length])),
        bookings_today: todays.length,
        used_today: todays.filter(b => b.status === "Approved").length,
        pending_today: todays.filter(b => b.status === "Pending").length,
        standby_today: db.vehicles.length - todays.filter(b => b.status === "Approved").length,
        total_bookings: db.bookings.length,
        pending_total: db.bookings.filter(b => b.status === "Pending").length,
      }};
    }
    case "updateBooking": {
      const b = db.bookings.find(x => x.id === p.id);
      if (!b) return { success: false, msg: "Tidak ditemukan." };
      ["status","driver","keterangan","tujuan","pic","divisi","tanggal"].forEach(f => { if (p[f] !== undefined) b[f] = p[f]; });
      return { success: true };
    }
    case "deleteBooking": {
      const i = db.bookings.findIndex(x => x.id === p.id);
      if (i < 0) return { success: false, msg: "Tidak ditemukan." };
      db.bookings.splice(i, 1); return { success: true };
    }
    case "getVehicles": return { success: true, data: db.vehicles };
    case "addVehicle": {
      const id = "V" + Date.now();
      db.vehicles.push({ id, nama: p.nama.toUpperCase(), plat: p.plat.toUpperCase(), kategori: p.kategori, status: "Tersedia" });
      return { success: true, id };
    }
    case "updateVehicle": {
      const v = db.vehicles.find(x => x.id === p.id);
      if (!v) return { success: false, msg: "Tidak ditemukan." };
      ["nama","plat","kategori","status"].forEach(f => { if (p[f] !== undefined) v[f] = (f==="nama"||f==="plat")? String(p[f]).toUpperCase() : p[f]; });
      return { success: true };
    }
    case "deleteVehicle": {
      const i = db.vehicles.findIndex(x => x.id === p.id);
      if (i < 0) return { success: false, msg: "Tidak ditemukan." };
      // Cek apakah ada booking
      if (db.bookings.find(b => b.vehicle_id === p.id)) return { success: false, msg: "Armada masih punya history booking." };
      db.vehicles.splice(i, 1); return { success: true };
    }
  }
  return { success: false, msg: "Mock action tidak dikenal." };
}

// ============================================================
// UTILS
// ============================================================
function $(sel, root = document) { return root.querySelector(sel); }
function fmtDate(s) {
  if (!s) return "-";
  const d = new Date(s);
  if (isNaN(d)) return s;
  return d.toLocaleDateString("id-ID", { day: "2-digit", month: "short", year: "numeric" });
}
function statusBadge(status) {
  const map = {
    "Approved": "bg-blue-100 text-blue-700",
    "Pending":  "bg-amber-100 text-amber-700",
    "Rejected": "bg-rose-100 text-rose-700",
    "Completed":"bg-emerald-100 text-emerald-700",
  };
  const label = status === "Approved" ? "USED" : (status || "-").toUpperCase();
  return `<span class="px-2 py-1 rounded-md text-[10px] font-bold uppercase tracking-wider ${map[status] || 'bg-slate-100 text-slate-500'}">${label}</span>`;
}
function escapeHtml(s) {
  return String(s == null ? "" : s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

function toast(msg, type = "info") {
  const colors = {
    success: "bg-emerald-600", error: "bg-rose-600", info: "bg-slate-800", warn: "bg-amber-600"
  };
  const el = document.createElement("div");
  el.className = `pointer-events-auto ${colors[type]} text-white px-4 py-3 rounded-xl shadow-lg text-sm font-medium fade-in max-w-sm`;
  el.textContent = msg;
  $("#fmsToast").appendChild(el);
  setTimeout(() => { el.style.transition = "opacity .3s"; el.style.opacity = "0"; }, 2800);
  setTimeout(() => el.remove(), 3200);
}

function openModal(html, opts = {}) {
  const sizeCls = opts.size === "sm" ? "max-w-md" : "max-w-lg";
  $("#fmsModalRoot").innerHTML = `
    <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[99995] flex items-end sm:items-center justify-center p-0 sm:p-4 fade-in" onclick="if(event.target===this) closeModal()">
      <div class="bg-white rounded-t-3xl sm:rounded-3xl ${sizeCls} w-full shadow-2xl overflow-hidden max-h-[92vh] overflow-y-auto">${html}</div>
    </div>`;
  document.body.style.overflow = "hidden";
}
function closeModal() {
  $("#fmsModalRoot").innerHTML = "";
  document.body.style.overflow = "";
}

function confirmDialog(title, msg, onYes) {
  openModal(`
    <div class="p-6">
      <h3 class="text-lg font-extrabold text-slate-800">${escapeHtml(title)}</h3>
      <p class="text-sm text-slate-500 mt-1 mb-5">${escapeHtml(msg)}</p>
      <div class="flex gap-2">
        <button id="confirmNo" class="flex-1 py-3 rounded-xl font-bold text-sm text-slate-500 bg-slate-100 hover:bg-slate-200">Batal</button>
        <button id="confirmYes" class="flex-1 py-3 rounded-xl font-bold text-sm text-white bg-rose-600 hover:bg-rose-700">Ya, lanjutkan</button>
      </div>
    </div>`, { size: "sm" });
  const yesBtn = $("#confirmYes");
  const noBtn = $("#confirmNo");
  noBtn.onclick = () => closeModal();
  yesBtn.onclick = async () => {
    setBusy(yesBtn, true);
    noBtn.disabled = true;
    try { await onYes(); } catch (e) { console.error(e); }
    closeModal();
  };
}

function setBusy(btn, busy, label) {
  if (!btn) return;
  if (busy) {
    btn.dataset.label = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = `<span class="inline-block w-4 h-4 border-2 border-white/30 border-t-white rounded-full spin align-middle"></span>`;
  } else {
    btn.disabled = false;
    btn.innerHTML = label || btn.dataset.label || "OK";
  }
}

// ============================================================
// ROUTER / NAV
// ============================================================
function go(view) {
  state.view = view;
  document.querySelectorAll(".fms-nav").forEach(b => {
    b.classList.toggle("bg-slate-900", b.dataset.nav === view);
    b.classList.toggle("text-white",   b.dataset.nav === view);
    b.classList.toggle("text-slate-600", b.dataset.nav !== view);
  });
  render();
}

function renderNavAdmin() {
  const wrap = $("#navAdminWrap");
  // Navbar selalu minimal: cuma tombol "Panel Admin" (atau "Admin Portal" kalau belum login)
  const isAdminView = state.view.startsWith("admin-");
  const target = state.user ? "admin-dashboard" : "login";
  const label = state.user ? "Panel Admin" : "Admin Portal";
  wrap.innerHTML = `
    <button data-nav="${target}" onclick="go('${target}')"
      class="fms-nav px-4 py-2 rounded-xl text-xs sm:text-sm font-bold ${isAdminView ? 'bg-slate-900 text-white' : 'bg-slate-100 text-slate-700 hover:bg-slate-200'}">
      ${label}
    </button>`;
  document.querySelectorAll(".fms-nav").forEach(b => {
    const active = b.dataset.nav === state.view || (isAdminView && b.dataset.nav === "admin-dashboard");
    b.classList.toggle("bg-slate-900", active);
    b.classList.toggle("text-white",   active);
    if (!active && !b.classList.contains("bg-slate-100")) {
      b.classList.add("text-slate-600");
    }
  });
}

// Render shell sidebar untuk view admin
function renderAdminShell(activeKey, contentHtml) {
  const items = [
    { key: "admin-dashboard",  label: "Dashboard",   icon: "M3 12l9-9 9 9M5 10v10a1 1 0 001 1h3v-6h6v6h3a1 1 0 001-1V10" },
    { key: "admin-monitoring", label: "Monitoring",  icon: "M9 17v-6h13M9 17a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2v10zM22 11V7a2 2 0 00-2-2h-7" },
    { key: "admin-history",    label: "History",     icon: "M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" },
    { key: "admin-master",     label: "Master Data", icon: "M4 6h16M4 10h16M4 14h16M4 18h16" },
  ];
  return `
    <div class="lg:grid lg:grid-cols-[240px_1fr] gap-6 fade-in">
      <!-- Mobile: horizontal pill nav -->
      <div class="lg:hidden bg-white border border-slate-200 rounded-2xl p-2 mb-4">
        <div class="flex items-center gap-2 overflow-x-auto pb-0.5" style="scrollbar-width:none">
          ${items.map(it => `
            <button onclick="go('${it.key}')"
              class="flex-shrink-0 px-4 py-2 rounded-xl text-xs font-bold transition whitespace-nowrap
                     ${activeKey===it.key ? 'bg-blue-600 text-white shadow-md shadow-blue-200' : 'bg-slate-50 text-slate-600 hover:bg-slate-100'}">
              ${it.label}
            </button>`).join("")}
          <button onclick="doLogout()" class="flex-shrink-0 ml-auto px-4 py-2 rounded-xl text-xs font-bold bg-rose-50 text-rose-600 hover:bg-rose-100 border border-rose-200 whitespace-nowrap">
            ⎋ Logout
          </button>
        </div>

      <!-- Desktop: vertical sidebar -->

function labelOfVehicle(id) {
  const v = state.vehicles.find(x => x.id === id);
  return v ? `${v.nama} • ${v.plat}` : "—";
}

function renderCategorySection(cat, bookedMap) {
  const list = state.vehicles.filter(v => v.kategori === cat.key);
  if (!list.length) return "";
  return `
    <section>
      <div class="flex items-center gap-3 mb-4">
        <div class="fms-bar h-7" style="background:${cat.hex}"></div>

// Tentukan status armada pada tanggal tampil (carry-over + range rule):
// - Jika ada booking "Approved" yang belum Completed dengan tanggal <= displayDate → USED
// - Else, kalau ada booking "Pending" dengan range mencakup displayDate → PENDING
// - Else → STANDBY
function getVehicleState(vehicleId, displayDate) {
  const list = state.schedule.filter(b => b.vehicle_id === vehicleId);
  const ongoingApproved = list
    .filter(b => b.status === "Approved" && b.tanggal <= displayDate)
    .sort((a, b) => b.tanggal.localeCompare(a.tanggal))[0];
  if (ongoingApproved) return { label: "USED", booking: ongoingApproved };
  const pending = list.find(b => b.status === "Pending" && b.tanggal <= displayDate && bookingEnd(b) >= displayDate);
  if (pending) return { label: "PENDING", booking: pending };
  return { label: "STANDBY", booking: null };
}

// Ambil semua booking aktif (Pending/Approved) untuk satu vehicle yang END-nya >= hari ini
function getVehicleSchedule(vehicleId) {
  const today = isoToday();
  return state.schedule
    .filter(b => b.vehicle_id === vehicleId && (b.status === "Pending" || b.status === "Approved") && bookingEnd(b) >= today)
    .sort((a, b) => a.tanggal.localeCompare(b.tanggal));
}

// Format range: "28 Apr" atau "28 Apr → 02 Mei"
function fmtRange(b) {
  if (bookingDurasi(b) <= 1) return fmtDate(b.tanggal);
  return `${fmtDate(b.tanggal)} → ${fmtDate(bookingEnd(b))}`;
}

function renderVehicleCard(v, cat, booking) {
  const isMaintenance = v.status === "Maintenance";
  const isNonAktif    = v.status === "Non-Aktif";
  const isOffline     = isMaintenance || isNonAktif;
  const isUsed    = !isOffline && booking && booking.status === "Approved";
  const isPending = !isOffline && booking && booking.status === "Pending";
  const dotColor  = isOffline ? "bg-rose-500"
                    : (isUsed ? "bg-blue-500" : (isPending ? "bg-amber-500" : "bg-emerald-500"));
  const stateText = isMaintenance ? "MAINTENANCE"
                    : (isNonAktif ? "NON-AKTIF"
                    : (isUsed ? "USED" : (isPending ? "PENDING" : "STANDBY")));
  const disabled  = isOffline || isUsed || isPending;

  const schedule = getVehicleSchedule(v.id);
  // Booking yg bukan untuk hari ini = jadwal mendatang
  const upcoming = schedule.filter(b => b.tanggal !== state.date);
  const previewItems = upcoming.slice(0, 2);
  const moreCount = Math.max(0, upcoming.length - previewItems.length);

  const scheduleBlock = upcoming.length === 0 ? "" : `
    <div class="mt-3 pt-3 border-t border-slate-100">
      <div class="flex items-center justify-between mb-1.5">
        <span class="text-[10px] font-bold uppercase tracking-wider text-slate-400">📅 Jadwal Mendatang</span>
        <button onclick="openScheduleModal('${v.id}')" class="text-[10px] font-bold text-blue-600 hover:text-blue-700">Lihat semua</button>
      </div>
      <div class="space-y-1">
        ${previewItems.map(b => {
          const c = b.status === "Approved" ? "bg-blue-50 text-blue-700" : "bg-amber-50 text-amber-700";
          return `<div class="flex items-center justify-between text-[11px] px-2 py-1 rounded-md ${c}">
            <span class="font-bold">${fmtRange(b)}</span>
            <span class="font-semibold opacity-70 truncate ml-2">${escapeHtml(b.pic)}</span>
          </div>`;
        }).join("")}
        ${moreCount > 0 ? `<button onclick="openScheduleModal('${v.id}')" class="text-[10px] text-slate-400 hover:text-slate-600 font-semibold">+ ${moreCount} jadwal lain</button>` : ""}
      </div>
    </div>`;

  const cardCls = isOffline
    ? 'bg-rose-50/60 border-rose-200 opacity-80'
    : (disabled ? 'bg-white border-slate-200 opacity-95' : 'bg-white border-slate-200 hover:border-blue-300 hover:shadow-md');

  let btnHtml;
  if (isOffline) {
    btnHtml = `<button disabled class="mt-3 w-full py-2 rounded-xl text-xs font-bold bg-rose-100 text-rose-600 cursor-not-allowed">🔧 Tidak Tersedia</button>`;
  } else {
    btnHtml = `<button onclick="openBookingModal('${v.id}')"
        class="mt-3 w-full py-2 rounded-xl text-xs font-bold transition
               ${disabled ? 'bg-slate-100 text-slate-700 hover:bg-slate-200' : 'bg-blue-600 hover:bg-blue-700 text-white'}">
        ${disabled ? 'Booking tgl lain' : 'Booking sekarang'}
      </button>`;
  }

  return `
    <div class="p-4 rounded-2xl border transition-all flex flex-col ${cardCls}">
      <div class="flex items-start justify-between mb-3">
        <div class="w-10 h-10 rounded-xl flex items-center justify-center text-white font-black text-sm shadow-sm" style="background:${cat.hex}">
          ${escapeHtml(v.nama.charAt(0))}
        </div>
        <span class="font-mono text-[10px] font-black text-slate-400 tracking-wider">${escapeHtml(v.plat)}</span>
      </div>
      <h4 class="font-bold text-sm text-slate-800 truncate">${escapeHtml(v.nama)}</h4>
      <div class="flex items-center justify-between mt-2 pt-2 border-t border-dashed border-slate-100">
        <div class="flex items-center gap-1.5">
          <span class="w-1.5 h-1.5 rounded-full ${dotColor}"></span>
          <span class="text-[10px] font-bold uppercase tracking-wider ${isOffline ? 'text-rose-600' : 'text-slate-500'}">${stateText}</span>
        </div>
        ${booking && !isOffline ? `<span class="text-[10px] text-slate-400 truncate max-w-[120px]" title="${escapeHtml(booking.pic)}">PIC: ${escapeHtml(booking.pic)}</span>` : ""}
      </div>
      ${isOffline ? "" : scheduleBlock}
      ${btnHtml}
    </div>`;
}

function openBookingModal(vehicleId) {
  const v = state.vehicles.find(x => x.id === vehicleId);
  if (!v) return;
  if (v.status && v.status !== "Tersedia") {
    return toast(`Armada sedang ${v.status} dan tidak dapat dibooking.`, "error");
  }
  const cat = CATEGORIES.find(c => c.key === v.kategori) || {};
  const today = isoToday();

  // Semua booking aktif yang belum berakhir (Pending/Approved) — jadi dasar validasi range
  const activeBookings = state.schedule
    .filter(b => b.vehicle_id === vehicleId && (b.status === "Pending" || b.status === "Approved") && bookingEnd(b) >= today);
  // Expand semua tanggal terkunci dari range booking
  const bookedDates = {};
  activeBookings.forEach(b => {
    bookingDates(b).forEach(d => { if (d >= today) bookedDates[d] = b; });
  });
  const bookedDateList = Object.keys(bookedDates).sort();

  // Default tanggal: hari ini kalau belum dibooking, kalau tidak cari hari pertama yang kosong
  let defaultDate = state.date;
  if (bookedDates[defaultDate]) {
    let d = new Date();
    for (let i = 0; i < 365; i++) {
      const s = isoDateLocal(d);
      if (!bookedDates[s] && s >= today) { defaultDate = s; break; }
      d = new Date(d.getTime() + 86400000);
    }
  }

  const bookedChips = activeBookings.length === 0 ? "" : `
    <div class="mx-5 sm:mx-6 mt-4 p-3 rounded-xl bg-amber-50 border border-amber-200">
      <p class="text-[10px] font-bold uppercase tracking-wider text-amber-700 mb-2">⚠️ Tanggal yang sudah dibooking</p>
      <div class="flex flex-wrap gap-1.5">
        ${activeBookings.sort((a,b)=>a.tanggal.localeCompare(b.tanggal)).map(b => {
          const cls = b.status === "Approved" ? "bg-blue-100 text-blue-700 border-blue-200" : "bg-amber-100 text-amber-700 border-amber-200";
          return `<span class="px-2 py-1 rounded-md text-[10px] font-bold border ${cls}" title="${escapeHtml(b.pic)} - ${escapeHtml(b.status)}">${fmtRange(b)}${bookingDurasi(b)>1 ? ` (${bookingDurasi(b)}h)` : ''}</span>`;
        }).join("")}
      </div>
      <p class="text-[10px] text-amber-600 mt-2">Pilih tanggal + durasi yang tidak bentrok dengan range di atas.</p>
    </div>`;

  openModal(`
    <div>
      <div class="p-5 sm:p-6 flex items-center gap-3 border-b border-slate-100" style="background: linear-gradient(135deg, ${cat.hex || '#2563eb'}15, transparent)">
        <div class="w-12 h-12 rounded-2xl flex items-center justify-center text-white font-black text-lg shadow-md flex-shrink-0" style="background:${cat.hex}">
          ${escapeHtml(v.nama.charAt(0))}
        </div>
        <div class="flex-1 min-w-0">
          <h3 class="font-extrabold text-slate-800 truncate">${escapeHtml(v.nama)}</h3>
          <p class="text-xs text-slate-500 font-mono">${escapeHtml(v.plat)} • ${escapeHtml(v.kategori)}</p>
        </div>
        <button onclick="closeModal()" class="w-9 h-9 rounded-full bg-slate-100 hover:bg-slate-200 text-slate-500 flex items-center justify-center flex-shrink-0">✕</button>
      </div>
      ${bookedChips}
      <form class="p-5 sm:p-6 space-y-3" onsubmit="event.preventDefault(); submitBookingModal('${v.id}', this)">
        <div>
          <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Nama PIC</label>
          <input name="pic" required class="w-full mt-1 px-3 py-3 bg-slate-50 rounded-xl border border-slate-200 text-sm focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Nama lengkap">
        </div>
        <div>
          <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Divisi</label>
          <input name="divisi" required class="w-full mt-1 px-3 py-3 bg-slate-50 rounded-xl border border-slate-200 text-sm focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Contoh: PHR / MARKETING">
        </div>
        <div class="grid grid-cols-2 gap-2">
          <div>
            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Tanggal Mulai</label>
            <input id="bookDate" name="tanggal" type="date" required value="${defaultDate}" min="${today}"
              oninput="validateBookRange()"
              class="w-full mt-1 px-3 py-3 bg-slate-50 rounded-xl border border-slate-200 text-sm focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none">
          </div>
          <div>
            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Lama Pakai (hari)</label>
            <input id="bookDurasi" name="durasi" type="number" min="1" max="90" required value="1"
              oninput="validateBookRange()"
              class="w-full mt-1 px-3 py-3 bg-slate-50 rounded-xl border border-slate-200 text-sm focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none">
          </div>
        </div>
        <div id="bookRangeInfo" class="p-2.5 rounded-lg bg-blue-50 border border-blue-100 text-[11px] text-blue-700 font-semibold">
          <!-- diisi validateBookRange -->
        </div>
        <input type="hidden" id="bookedDatesJson" value='${JSON.stringify(bookedDateList)}'>
        <p id="bookDateMsg" class="text-[10px] hidden font-bold text-rose-600"></p>
        <div>
          <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Tujuan / Lokasi</label>
          <textarea name="tujuan" required rows="2" class="w-full mt-1 px-3 py-3 bg-slate-50 rounded-xl border border-slate-200 text-sm focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Tujuan penggunaan"></textarea>
        </div>
        <div class="flex gap-2 pt-2">
          <button type="button" onclick="closeModal()" class="flex-1 py-3 rounded-xl font-bold text-sm text-slate-500 bg-slate-100 hover:bg-slate-200">Batal</button>
          <button type="submit" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-bold text-sm shadow-lg shadow-blue-200 active:scale-[.98]">Ajukan</button>
        </div>
      </form>
    </div>`);
  setTimeout(validateBookRange, 0);
}

function isoDateLocal(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}

// Validasi range start+durasi vs tanggal-tanggal yang sudah dibooking
function validateBookRange() {
  const dateInput = $("#bookDate");
  const durInput = $("#bookDurasi");
  if (!dateInput || !durInput) return;
  const start = dateInput.value;
  const dur = Math.max(1, parseInt(durInput.value) || 1);
  const booked = JSON.parse(($("#bookedDatesJson") || {}).value || "[]");
  const info = $("#bookRangeInfo");
  const msg = $("#bookDateMsg");

  if (!start) return;
  const end = addDaysIso(start, dur - 1);

  // Expand range [start, end] dan cek apakah ada yg bentrok
  let conflictDate = null;
  for (let i = 0; i < dur; i++) {
    const d = addDaysIso(start, i);
    if (booked.includes(d)) { conflictDate = d; break; }
  }

  if (info) {
    info.innerHTML = dur === 1
      ? `📅 Dipakai <b>1 hari</b> pada <b>${fmtDate(start)}</b>`
      : `📅 Dipakai <b>${dur} hari</b>: <b>${fmtDate(start)}</b> s/d <b>${fmtDate(end)}</b>`;
    info.classList.toggle("bg-blue-50", !conflictDate);
    info.classList.toggle("border-blue-100", !conflictDate);
    info.classList.toggle("text-blue-700", !conflictDate);
    info.classList.toggle("bg-rose-50", !!conflictDate);
    info.classList.toggle("border-rose-200", !!conflictDate);
    info.classList.toggle("text-rose-700", !!conflictDate);
  }

  if (conflictDate) {
    if (msg) {
      msg.textContent = `Bentrok di tanggal ${fmtDate(conflictDate)}. Pilih tanggal / durasi lain.`;
      msg.classList.remove("hidden");
    }
    dateInput.setCustomValidity("Range bentrok dengan booking lain.");
    durInput.setCustomValidity("Range bentrok dengan booking lain.");
    dateInput.classList.add("ring-2","ring-rose-300");
    durInput.classList.add("ring-2","ring-rose-300");
  } else {
    if (msg) msg.classList.add("hidden");
    dateInput.setCustomValidity("");
    durInput.setCustomValidity("");
    dateInput.classList.remove("ring-2","ring-rose-300");
    durInput.classList.remove("ring-2","ring-rose-300");
  }
}

function updateEditRangeInfo() {
  const d = $("#editBookDate"); const n = $("#editBookDurasi");
  const info = $("#editRangeInfo");
  if (!d || !n || !info) return;
  const start = d.value; const dur = Math.max(1, parseInt(n.value) || 1);
  if (!start) return;
  const end = addDaysIso(start, dur - 1);
  info.innerHTML = dur === 1
    ? `📅 Dipakai <b>1 hari</b> pada <b>${fmtDate(start)}</b>`
    : `📅 Dipakai <b>${dur} hari</b>: <b>${fmtDate(start)}</b> s/d <b>${fmtDate(end)}</b>`;
}

async function saveEditBooking(id, form) {

  ["tanggal","durasi","pic","divisi","tujuan","driver","keterangan","status"].forEach(f => payload[f] = fd.get(f) || "");
  const btn = form.querySelector("button[type=submit]");
  setBusy(btn, true);
  const res = await api("updateBooking", payload);
  setBusy(btn, false);
  if (!res.success) return toast(res.msg || "Gagal", "error");
  closeModal();
  toast("Booking diperbarui.", "success");
  renderAdminMonitoring();
}

function confirmDeleteBooking(id) {
  confirmDialog("Hapus booking?", "Aksi ini permanen dan tidak bisa di-undo.", async () => {
    const res = await api("deleteBooking", { token: state.token, id });
    if (!res.success) return toast(res.msg || "Gagal", "error");
    toast("Booking dihapus.", "success");
    renderAdminMonitoring();
  });
}

function openCreateForVehicle(vehicleId) {
  const v = state.vehicles.find(x => x.id === vehicleId);
  if (!v) return;
  if (v.status && v.status !== "Tersedia") {
    return toast(`Armada sedang ${v.status} dan tidak dapat dibooking.`, "error");
  }
  // Tanggal yang sudah dibooking (≠Rejected/Completed) — expand range
  const today = isoToday();
  const activeBookings = state.schedule
    .filter(b => b.vehicle_id === vehicleId && (b.status === "Pending" || b.status === "Approved") && bookingEnd(b) >= today);
  const blocked = [];
  activeBookings.forEach(b => bookingDates(b).forEach(d => { if (d >= today) blocked.push(d); }));
  openModal(`
    <div class="p-6">
      <h3 class="text-lg font-extrabold text-slate-800">Tambah Booking</h3>
      <p class="text-xs text-slate-400 mt-0.5">${escapeHtml(v.nama)} • ${escapeHtml(v.plat)}</p>
      <form class="space-y-3 mt-5" onsubmit="event.preventDefault(); saveCreateBooking('${vehicleId}', this)">
        <div class="grid grid-cols-2 gap-2">
          <div>
            <label class="text-[10px] font-bold text-slate-400 uppercase">Tanggal Mulai</label>
            <input id="acDate" name="tanggal" type="date" value="${state.date}" required min="${today}"
              oninput="validateAdminCreateRange()"
              class="w-full mt-1 px-3 py-2 bg-slate-50 rounded-lg border border-slate-200 text-sm">
          </div>
          <div>
            <label class="text-[10px] font-bold text-slate-400 uppercase">Lama (hari)</label>
            <input id="acDurasi" name="durasi" type="number" min="1" max="90" value="1" required
              oninput="validateAdminCreateRange()"
              class="w-full mt-1 px-3 py-2 bg-slate-50 rounded-lg border border-slate-200 text-sm">
          </div>
        </div>
        <div id="acRangeInfo" class="p-2 rounded-lg bg-blue-50 border border-blue-100 text-[11px] text-blue-700 font-semibold"></div>
        <input type="hidden" id="acBlocked" value='${JSON.stringify(blocked)}'>
        <p id="adminCreateDateMsg" class="text-[10px] hidden font-bold text-rose-600"></p>
        ${activeBookings.length ? `<p class="text-[10px] text-slate-400">Terkunci: ${activeBookings.map(b => fmtRange(b)).join(", ")}</p>` : ""}
        <div class="grid grid-cols-2 gap-2">
          <div><label class="text-[10px] font-bold text-slate-400 uppercase">PIC</label>
            <input name="pic" required class="w-full mt-1 px-3 py-2 bg-slate-50 rounded-lg border border-slate-200 text-sm"></div>
          <div><label class="text-[10px] font-bold text-slate-400 uppercase">Divisi</label>
            <input name="divisi" required class="w-full mt-1 px-3 py-2 bg-slate-50 rounded-lg border border-slate-200 text-sm"></div>
        </div>
        <div><label class="text-[10px] font-bold text-slate-400 uppercase">Tujuan</label>
          <input name="tujuan" required class="w-full mt-1 px-3 py-2 bg-slate-50 rounded-lg border border-slate-200 text-sm"></div>
        <div><label class="text-[10px] font-bold text-slate-400 uppercase">Driver</label>
          <input name="driver" class="w-full mt-1 px-3 py-2 bg-slate-50 rounded-lg border border-slate-200 text-sm"></div>
        <div><label class="text-[10px] font-bold text-slate-400 uppercase">Keterangan</label>
          <textarea name="keterangan" rows="2" class="w-full mt-1 px-3 py-2 bg-slate-50 rounded-lg border border-slate-200 text-sm"></textarea></div>
        <div class="flex gap-2 pt-3">
          <button type="button" onclick="closeModal()" class="flex-1 py-3 rounded-xl font-bold text-sm text-slate-500 bg-slate-100 hover:bg-slate-200">Batal</button>
          <button type="submit" class="flex-1 py-3 rounded-xl font-bold text-sm text-white bg-blue-600 hover:bg-blue-700">Buat & Approve</button>
        </div>
      </form>
    </div>`);
  setTimeout(validateAdminCreateRange, 0);
}

function validateAdminCreateRange() {
  const dateInput = $("#acDate"); const durInput = $("#acDurasi");
  const info = $("#acRangeInfo"); const msg = $("#adminCreateDateMsg");
  if (!dateInput || !durInput) return;
  const start = dateInput.value;
  const dur = Math.max(1, parseInt(durInput.value) || 1);
  const blocked = JSON.parse(($("#acBlocked") || {}).value || "[]");
  if (!start) return;
  const end = addDaysIso(start, dur - 1);
  let conflictDate = null;
  for (let i = 0; i < dur; i++) {
    const d = addDaysIso(start, i);
    if (blocked.includes(d)) { conflictDate = d; break; }
  }
  if (info) {
    info.innerHTML = dur === 1
      ? `📅 Dipakai <b>1 hari</b> pada <b>${fmtDate(start)}</b>`
      : `📅 Dipakai <b>${dur} hari</b>: <b>${fmtDate(start)}</b> s/d <b>${fmtDate(end)}</b>`;
    info.classList.toggle("bg-blue-50", !conflictDate);
    info.classList.toggle("border-blue-100", !conflictDate);
    info.classList.toggle("text-blue-700", !conflictDate);
    info.classList.toggle("bg-rose-50", !!conflictDate);
    info.classList.toggle("border-rose-200", !!conflictDate);
    info.classList.toggle("text-rose-700", !!conflictDate);
  }
  if (conflictDate) {
    if (msg) { msg.textContent = `Bentrok di ${fmtDate(conflictDate)}.`; msg.classList.remove("hidden"); }
    dateInput.setCustomValidity("Bentrok"); durInput.setCustomValidity("Bentrok");
    dateInput.classList.add("ring-2","ring-rose-300"); durInput.classList.add("ring-2","ring-rose-300");
  } else {
    if (msg) msg.classList.add("hidden");
    dateInput.setCustomValidity(""); durInput.setCustomValidity("");
    dateInput.classList.remove("ring-2","ring-rose-300"); durInput.classList.remove("ring-2","ring-rose-300");
  }
}

async function saveCreateBooking(vehicleId, form) {
  const fd = new FormData(form);
  const tanggal = fd.get("tanggal");
  const durasi = Math.max(1, parseInt(fd.get("durasi")) || 1);
  const btn = form.querySelector("button[type=submit]");
  setBusy(btn, true);
  const sub = await api("submitBooking", {
    vehicle_id: vehicleId,
    pic: fd.get("pic"), divisi: fd.get("divisi"),
    tujuan: fd.get("tujuan"), tanggal, durasi,
  });
  if (!sub.success) { setBusy(btn, false); return toast(sub.msg || "Gagal", "error"); }
  const upd = await api("updateBooking", {
    token: state.token, id: sub.id,
    status: "Approved",
    driver: fd.get("driver") || "",
    keterangan: fd.get("keterangan") || "",
  });
  setBusy(btn, false);
  if (!upd.success) return toast(upd.msg || "Gagal approve", "error");
  closeModal();
  toast("Booking dibuat & disetujui.", "success");
  renderAdminMonitoring();
}

function applyHistoryFilter() {
  state.historyFilter = {
    from: $("#hFrom").value, to: $("#hTo").value,
    status: $("#hStatus").value, kategori: $("#hKat").value,
  };
  renderAdminHistory();
}
function resetHistoryFilter() {
  state.historyFilter = { from: "", to: "", status: "", kategori: "" };
  renderAdminHistory();
}

            <th class="text-left p-3">Divisi</th>
            <th class="text-left p-3">Tujuan</th>
            <th class="text-left p-3">Driver</th>
            <th class="text-left p-3">Status</th>
            <th class="text-right p-3">Aksi</th>

            ${rows.map(r => `

                <td class="p-3"><b>${escapeHtml(r.vehicle_nama)}</b><br><span class="font-mono text-[10px] text-slate-400">${escapeHtml(r.vehicle_plat)}</span></td>
                <td class="p-3 text-xs text-slate-500">${escapeHtml(r.kategori)}</td>
                <td class="p-3 font-semibold text-slate-700">${escapeHtml(r.pic)}</td>
                <td class="p-3 text-slate-600">${escapeHtml(r.divisi)}</td>
                <td class="p-3 text-slate-600 max-w-[180px] truncate" title="${escapeHtml(r.tujuan)}">${escapeHtml(r.tujuan)}</td>
                <td class="p-3 text-slate-600">${escapeHtml(r.driver) || '-'}</td>
                <td class="p-3">${statusBadge(r.status)}</td>
                <td class="p-3 text-right">
                  <button onclick="openEditFromHistory('${r.id}')" class="px-3 py-1.5 bg-slate-100 hover:bg-slate-900 hover:text-white rounded-lg text-xs font-bold">Detail</button>
                </td>
              </tr>`).join("")}
          </tbody>
        </table>

      <div class="p-3 text-xs text-slate-400 bg-slate-50 border-t border-slate-200">${rows.length} data ditemukan</div>
    </div>`;
}

function openEditFromHistory(id) {
  const r = state.history.find(x => x.id === id);
  if (!r) return;
  // Reuse: simulasikan agar saveEditBooking juga berfungsi dari history
  state.bookings = state.history;
  state.vehicles = state.vehicles.length ? state.vehicles : [{ id: r.vehicle_id, nama: r.vehicle_nama, plat: r.vehicle_plat }];
  openEditBooking(id);
  // Override callback after save → refresh history
  const oldHandler = window.saveEditBooking;
  window.saveEditBooking = async (idx, form) => {
    const fd = new FormData(form);
    const payload = { token: state.token, id: idx };
    ["tanggal","durasi","pic","divisi","tujuan","driver","keterangan","status"].forEach(f => payload[f] = fd.get(f) || "");
    const btn = form.querySelector("button[type=submit]");
    setBusy(btn, true);
    const res = await api("updateBooking", payload);
    setBusy(btn, false);
    if (!res.success) return toast(res.msg || "Gagal", "error");
    closeModal();
    toast("Booking diperbarui.", "success");
    window.saveEditBooking = oldHandler;
    renderAdminHistory();
  };
}

  $("#fmsMain").innerHTML = renderAdminShell("admin-master", `

      <div>
        <h2 class="text-2xl font-black text-slate-800">Master Data Kendaraan</h2>
        <p class="text-sm text-slate-500">Kelola seluruh armada</p>

      <button onclick="openVehicleForm()" class="w-full sm:w-auto px-4 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-xl text-sm font-bold shadow-lg shadow-blue-200">+ Tambah Armada</button>
    </div>

              ${g.items.map((v, i) => `

                  <td class="p-3 font-bold text-slate-700">${escapeHtml(v.nama)}</td>
                  <td class="p-3 font-mono text-blue-600">${escapeHtml(v.plat)}</td>
                  <td class="p-3"><span class="px-2 py-1 rounded-md text-[10px] font-bold uppercase ${v.status==='Tersedia'?'bg-emerald-100 text-emerald-700':(v.status==='Maintenance'?'bg-amber-100 text-amber-700':'bg-rose-100 text-rose-700')}">${escapeHtml(v.status)}</span></td>

function openVehicleForm(id) {
  const v = id ? state.vehicles.find(x => x.id === id) : null;
  openModal(`
    <div class="p-6">
      <h3 class="text-lg font-extrabold text-slate-800">${id ? 'Edit' : 'Tambah'} Armada</h3>
      <form class="space-y-3 mt-5" onsubmit="event.preventDefault(); saveVehicle('${id||''}', this)">
        <div><label class="text-[10px] font-bold text-slate-400 uppercase">Nama Kendaraan</label>
          <input name="nama" required value="${escapeHtml(v?v.nama:'')}" placeholder="Contoh: TOYOTA AVANZA" class="w-full mt-1 px-3 py-2 bg-slate-50 rounded-lg border border-slate-200 text-sm"></div>
        <div><label class="text-[10px] font-bold text-slate-400 uppercase">Plat Nomor</label>
          <input name="plat" required value="${escapeHtml(v?v.plat:'')}" placeholder="Contoh: B 1234 ABC" class="w-full mt-1 px-3 py-2 bg-slate-50 rounded-lg border border-slate-200 text-sm"></div>
        <div><label class="text-[10px] font-bold text-slate-400 uppercase">Kategori</label>
          <select name="kategori" class="w-full mt-1 px-3 py-2 bg-slate-50 rounded-lg border border-slate-200 text-sm">
            ${CATEGORIES.map(c => `<option ${v && v.kategori===c.key?'selected':''}>${c.key}</option>`).join("")}
          </select></div>
        ${id ? `<div><label class="text-[10px] font-bold text-slate-400 uppercase">Status</label>
          <select name="status" class="w-full mt-1 px-3 py-2 bg-slate-50 rounded-lg border border-slate-200 text-sm">
            ${["Tersedia","Maintenance","Non-Aktif"].map(s => `<option ${v && v.status===s?'selected':''}>${s}</option>`).join("")}
          </select></div>`:""}
        <div class="flex gap-2 pt-3">
          <button type="button" onclick="closeModal()" class="flex-1 py-3 rounded-xl font-bold text-sm text-slate-500 bg-slate-100 hover:bg-slate-200">Batal</button>
          <button type="submit" class="flex-1 py-3 rounded-xl font-bold text-sm text-white bg-blue-600 hover:bg-blue-700">Simpan</button>
        </div>
      </form>
    </div>`, { size: "sm" });
}

async function saveVehicle(id, form) {
  const fd = new FormData(form);
  const payload = { token: state.token, nama: fd.get("nama"), plat: fd.get("plat"), kategori: fd.get("kategori") };
  if (id) { payload.id = id; payload.status = fd.get("status"); }
  const btn = form.querySelector("button[type=submit]");
  setBusy(btn, true);
  const res = await api(id ? "updateVehicle" : "addVehicle", payload);
  setBusy(btn, false);
  if (!res.success) return toast(res.msg || "Gagal", "error");
  closeModal();
  toast(id ? "Armada diperbarui." : "Armada ditambahkan.", "success");
  renderAdminMaster();
}

function confirmDeleteVehicle(id) {
  confirmDialog("Hapus armada?", "Pastikan armada ini tidak punya history booking.", async () => {
    const res = await api("deleteVehicle", { token: state.token, id });
    if (!res.success) return toast(res.msg || "Gagal", "error");
    toast("Armada dihapus.", "success");
    renderAdminMaster();
  });
}

// ============================================================
// COMMON HELPERS
// ============================================================
function loadingBlock() {
  return `<div class="text-center py-16"><div class="inline-block w-10 h-10 border-4 border-slate-200 border-t-blue-600 rounded-full spin"></div></div>`;
}
function errorBox(msg) {
  return `<div class="p-6 bg-rose-50 border border-rose-200 text-rose-700 rounded-2xl text-sm font-semibold">⚠️ ${escapeHtml(msg || "Terjadi kesalahan.")}</div>`;
}
function handleAuthError(res) {
  if (res && res.needLogin) {
    localStorage.removeItem("fms_token");
    state.user = null; state.token = null;
    toast("Sesi berakhir, silakan login ulang.", "warn");
    setTimeout(() => go("login"), 600);
  }
}
